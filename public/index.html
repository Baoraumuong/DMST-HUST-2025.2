<script>
/* ===================== CHATBOT DRAG ===================== */
(function() {
  const bot = document.getElementById('chatbot');
  const header = document.getElementById('chat-header');
  let dragging = false, startX, startY, startLeft, startTop;

  // Convert initial bottom/right to top/left so transform works cleanly
  function initPosition() {
    const r = bot.getBoundingClientRect();
    bot.style.left = r.left + 'px';
    bot.style.top = r.top + 'px';
    bot.style.right = 'auto';
    bot.style.bottom = 'auto';
  }

  header.addEventListener('mousedown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
    if (!bot.style.left) initPosition();
    dragging = true;
    startX = e.clientX; startY = e.clientY;
    startLeft = parseInt(bot.style.left); startTop = parseInt(bot.style.top);
    bot.classList.add('dragging');
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const dx = e.clientX - startX, dy = e.clientY - startY;
    let newLeft = startLeft + dx, newTop = startTop + dy;
    // clamp inside viewport
    newLeft = Math.max(0, Math.min(window.innerWidth - bot.offsetWidth, newLeft));
    newTop = Math.max(0, Math.min(window.innerHeight - bot.offsetHeight, newTop));
    bot.style.left = newLeft + 'px';
    bot.style.top = newTop + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    bot.classList.remove('dragging');
  });

  // Touch support
  header.addEventListener('touchstart', e => {
    if (!bot.style.left) initPosition();
    dragging = true;
    const t = e.touches[0];
    startX = t.clientX; startY = t.clientY;
    startLeft = parseInt(bot.style.left); startTop = parseInt(bot.style.top);
    bot.classList.add('dragging');
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (!dragging) return;
    const t = e.touches[0];
    const dx = t.clientX - startX, dy = t.clientY - startY;
    let newLeft = startLeft + dx, newTop = startTop + dy;
    newLeft = Math.max(0, Math.min(window.innerWidth - bot.offsetWidth, newLeft));
    newTop = Math.max(0, Math.min(window.innerHeight - bot.offsetHeight, newTop));
    bot.style.left = newLeft + 'px';
    bot.style.top = newTop + 'px';
  }, { passive: true });

  document.addEventListener('touchend', () => { dragging = false; bot.classList.remove('dragging'); });
})();

/* ===================== CHATBOT — Google Gemini ===================== */

let chatHistory = [];

async function sendMessageToAI(message) {
  try {
    const response = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message })
    });
    const data = await response.json().catch(() => null);
    if (!response.ok) {
      throw new Error(data?.error || "Không thể kết nối tới chatbot");
    }
    return data?.reply || "Xin lỗi, tôi chưa hiểu câu hỏi.";
  } catch (err) {
    console.error(err);
    return "Lỗi: " + err.message;
  }
}

const chatInput = document.getElementById("chat-input");
const sendBtn = document.getElementById("send-btn");
const chatMessages = document.getElementById("chat-messages");

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = `msg ${type}`; div.innerText = text;
  chatMessages.appendChild(div); chatMessages.scrollTop = chatMessages.scrollHeight;
}
sendBtn.onclick = async () => {
  const text = chatInput.value.trim(); if (!text) return;
  addMessage(text, "user"); chatInput.value = ""; addMessage("...", "bot");
  const reply = await sendMessageToAI(text); chatMessages.lastChild.innerText = reply;
};
chatInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendBtn.click(); });

/* ===================== STORAGE ===================== */
const USERS_STORAGE = "eduflow_users";
const CURRENT_USER_KEY = "eduflow_currentUser";
let currentUser = null;
let users = [];
let userFeedbacks = [];
let activeTab = "catalog";

function loadData() {
  const su = localStorage.getItem(USERS_STORAGE);
  users = su ? JSON.parse(su) : [];
  const sf = localStorage.getItem(FEEDBACK_STORAGE);
  userFeedbacks = sf ? JSON.parse(sf) : [];
  const sc = localStorage.getItem(CURRENT_USER_KEY);
  if (sc) {
    const cu = JSON.parse(sc);
    const found = users.find(u => u.id === cu.id);
    currentUser = found || null;
  }
}
function persistUsers() { localStorage.setItem(USERS_STORAGE, JSON.stringify(users)); }
function persistFeedbacks() { localStorage.setItem(FEEDBACK_STORAGE, JSON.stringify(userFeedbacks)); }
function persistCurrentUser() {
  if (currentUser) localStorage.setItem(CURRENT_USER_KEY, JSON.stringify(currentUser));
  else localStorage.removeItem(CURRENT_USER_KEY);
}
function updateUserInArray(u) {
  const i = users.findIndex(x => x.id === u.id);
  if (i !== -1) users[i] = u; else users.push(u);
  persistUsers();
  if (currentUser && currentUser.id === u.id) { currentUser = u; persistCurrentUser(); }
}
function getUserEnrolledCourses() {
  if (!currentUser) return [];
  const em = currentUser.enrolledCourses || {};
  return COURSES_DB.filter(c => em[c.id]).map(c => {
    const pd = em[c.id];
    const lc = pd?.lessonsCompleted || new Array(c.lessons.length).fill(false);
    const done = lc.filter(v => v === true).length;
    const pct = c.lessons.length === 0 ? 0 : Math.round((done / c.lessons.length) * 100);
    return { ...c, lessonsCompleted: lc, percent: pct, completedCount: done };
  });
}
function enrollCourse(courseId) {
  if (!currentUser) return false;
  const c = COURSES_DB.find(x => x.id === courseId); if (!c) return false;
  let em = currentUser.enrolledCourses || {};
  if (em[courseId]) return false;
  em[courseId] = { lessonsCompleted: new Array(c.lessons.length).fill(false) };
  currentUser.enrolledCourses = em; updateUserInArray(currentUser); return true;
}
function toggleLessonCompletion(courseId, idx) {
  if (!currentUser) return false;
  const em = currentUser.enrolledCourses || {}; if (!em[courseId]) return false;
  const arr = em[courseId].lessonsCompleted;
  if (idx >= 0 && idx < arr.length) {
    arr[idx] = !arr[idx]; em[courseId].lessonsCompleted = [...arr];
    currentUser.enrolledCourses = em; updateUserInArray(currentUser); return true;
  }
  return false;
}
function isEnrolled(courseId) { return !!(currentUser?.enrolledCourses?.[courseId]); }

function renderCatalog() {
  const container = document.getElementById("catalogView"); if (!container) return;
  let html = `<div class="courses-grid">`;
  COURSES_DB.forEach(c => {
    const ef = isEnrolled(c.id);
    const priceDisplay = c.price === 0
      ? `<span style="color:#059669;font-weight:700;">Miễn phí</span>`
      : `<span style="color:#1e6091;font-weight:700;">${c.price.toLocaleString('vi-VN')}đ</span>`;
    const mediaContent = c.imagePath
      ? `<img src="${c.imagePath}" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none';this.nextElementSibling.style.display='block';"><i class="${c.imageIcon||'fas fa-book'}" style="display:none;font-size:3rem;"></i>`
      : `<i class="${c.imageIcon||'fas fa-book'}" style="font-size:3rem;"></i>`;
    html += `
      <div class="course-card" data-course-id="${c.id}">
        <div class="course-img" style="background:#cfe5f0;height:160px;display:flex;align-items:center;justify-content:center;overflow:hidden;">${mediaContent}</div>
        <div class="course-info">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <div class="course-title" style="margin-bottom:0;font-size:1.1rem;">${escHtml(c.title)}</div>
            <div style="font-size:0.9rem;">${priceDisplay}</div>
          </div>
          <div class="course-instructor"><i class="fas fa-chalkboard-teacher"></i> ${escHtml(c.instructor)}</div>
          <div class="course-desc">${escHtml(c.desc)}</div>
          <button class="${ef ? 'enroll-btn enrolled' : 'enroll-btn'}" data-enroll-id="${c.id}" ${ef ? 'disabled' : ''}>${ef ? '✔ Đã đăng ký' : 'Đăng ký ngay'}</button>
        </div>
      </div>`;
  });
  html += `</div>`;
  container.innerHTML = html;
  document.querySelectorAll('[data-enroll-id]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const cid = parseInt(btn.getAttribute('data-enroll-id'));

    });
  });
}

function renderMyLearning() {
  const container = document.getElementById("mylearningView"); if (!container) return;
  if (!currentUser) {
    container.innerHTML = `<div class="empty-state"><i class="fas fa-lock" style="font-size:2rem;"></i><h3>Vui lòng đăng nhập</h3><p>Login để xem khoá học và theo dõi tiến độ.</p><button class="btn-sm btn-primary-sm" id="guestLoginPromptBtn">Login / Sign up</button></div>`;
    const pb = document.getElementById("guestLoginPromptBtn");
    if (pb) pb.onclick = () => document.getElementById("loginModal").style.display = "flex";
    return;
  }
  const ecs = getUserEnrolledCourses();
  if (ecs.length === 0) {
    container.innerHTML = `<div class="empty-state"><i class="fas fa-book-reader" style="font-size:2rem;"></i><h3>Chưa đăng ký khoá nào</h3><p>Khám phá khoá học và bắt đầu học ngay!</p></div>`;
    return;
  }
  let html = `<div class="my-learning-list">`;
  ecs.forEach(c => {
    const pct = c.percent || 0;
    html += `
      <div class="learning-course">
        <div class="learning-header">
          <div class="learning-title">${escHtml(c.title)}</div>
          <div class="progress-percent">${pct}% hoàn thành</div>
        </div>
        <div class="progress-bar-container"><div class="progress-fill" style="width:${pct}%;"></div></div>
        <div style="font-size:0.82rem;color:#5f6c80;margin-bottom:0.5rem;"><i class="fas fa-chalkboard-user"></i> ${escHtml(c.instructor)}</div>
        <ul class="lessons-list">`;
    c.lessons.forEach((lesson, idx) => {
      const checked = c.lessonsCompleted && c.lessonsCompleted[idx] === true;
      // Build resource buttons
      let resBtns = '';
      if (lesson.resources && lesson.resources.length > 0) {
        resBtns = `<div class="lesson-resources">`;
        lesson.resources.forEach(r => {
          if (r.type === 'video') {
            resBtns += `<button class="res-btn res-btn-video" onclick="window.open('${escHtml(r.url)}','_blank')"><i class="fas fa-play-circle"></i> ${escHtml(r.label)}</button>`;
          } else if (r.type === 'pdf') {
            resBtns += `<button class="res-btn res-btn-pdf" onclick="window.open('${escHtml(r.url)}','_blank')"><i class="fas fa-file-pdf"></i> ${escHtml(r.label)}</button>`;
          }
        });
        resBtns += `</div>`;
      }
      html += `
        <li class="lesson-item">
          <input type="checkbox" class="lesson-check" data-course="${c.id}" data-lesson-idx="${idx}" ${checked ? 'checked' : ''}>
          <span class="lesson-name">📘 ${escHtml(lesson.name)}</span>
          ${resBtns}
        </li>`;
    });
    html += `</ul></div>`;
  });
  html += `</div>`;
  container.innerHTML = html;
  document.querySelectorAll('.lesson-check').forEach(cb => {
    cb.addEventListener('change', () => {
      const cid = parseInt(cb.getAttribute('data-course'));
      const lid = parseInt(cb.getAttribute('data-lesson-idx'));
      if (!isNaN(cid) && !isNaN(lid)) { toggleLessonCompletion(cid, lid); renderMyLearning(); }
    });
  });
}

function buildLiveCard(s) {
  let pillClass, pillLabel, joinClass, joinLabel, joinAttr = '';
  if (s.status === 'live') {
    pillClass = 'pill-live'; pillLabel = '🔴 Đang Live';
    joinClass = 'join-btn-active'; joinLabel = '<i class="fas fa-video"></i> Tham gia ngay';
  } else if (s.status === 'upcoming') {
    pillClass = 'pill-upcoming'; pillLabel = '⏰ Sắp tới';
    joinClass = 'join-btn-upcoming'; joinLabel = '<i class="fas fa-lock"></i> Chưa mở';
    joinAttr = 'disabled';
  } else {
    pillClass = 'pill-ended'; pillLabel = '✓ Đã kết thúc';
    joinClass = 'join-btn-ended'; joinLabel = '<i class="fas fa-ban"></i> Đã kết thúc';
    joinAttr = 'disabled';
  }
  const participantInfo = s.status === 'live'
    ? `<div class="live-meta"><i class="fas fa-users"></i> ${s.participants} người đang học</div>`
    : s.status === 'ended'
    ? `<div class="live-meta"><i class="fas fa-users"></i> ${s.participants} người đã tham gia</div>`
    : '';
  const joinAction = s.meetLink && s.status === 'live'
    ? `onclick="window.open('${escHtml(s.meetLink)}','_blank')"`
    : '';
  return `
    <div class="live-card status-${s.status}">
      <div class="live-card-top">
        <div class="live-subject">${escHtml(s.subject)}</div>
        <div class="live-status-pill ${pillClass}">${pillLabel}</div>
      </div>
      <div class="live-teacher"><i class="fas fa-chalkboard-teacher"></i> ${escHtml(s.teacher)}</div>
      <div class="live-meta"><i class="fas fa-clock"></i> ${escHtml(s.dateStr)}</div>
      ${participantInfo}
      <div class="live-desc">${escHtml(s.desc)}</div>
      <button class="join-btn ${joinClass}" ${joinAttr} ${joinAction}>${joinLabel}</button>
    </div>`;
}

/* ===================== RENDER FEEDBACK ===================== */
function renderFeedback() {
  const container = document.getElementById("feedbackView"); if (!container) return;
  const feedbacks = [...userFeedbacks, ...DEFAULT_FEEDBACKS];
  const avg = feedbacks.length
    ? (feedbacks.reduce((sum, item) => sum + Number(item.rating || 0), 0) / feedbacks.length).toFixed(1)
    : "0.0";
  const positiveCount = feedbacks.filter(item => Number(item.rating || 0) >= 4).length;

  const courseOptions = COURSES_DB.map(c => `<option value="${escHtml(c.title)}">${escHtml(c.title)}</option>`).join("");
  const cards = feedbacks.map(item => buildFeedbackCard(item)).join("");

  container.innerHTML = `
    <div class="feedback-layout">
      <div class="feedback-panel">
        <h2><i class="fas fa-comment-dots"></i> Gửi phản hồi</h2>
        <p class="feedback-subtitle">Chia sẻ cảm nhận của bạn để X-Teaching cải thiện trải nghiệm học tập.</p>
        <form class="feedback-form" id="feedbackForm">
          <div>
            <label for="feedbackName">Tên của bạn</label>
            <input id="feedbackName" type="text" placeholder="Ví dụ: Nguyễn An" value="${currentUser ? escHtml(currentUser.username) : ""}" required>
          </div>
          <div>
            <label for="feedbackCourse">Nội dung liên quan</label>
            <select id="feedbackCourse">
              <option value="Trải nghiệm website">Trải nghiệm website</option>
              ${courseOptions}
              <option value="Phòng học trực tiếp">Phòng học trực tiếp</option>
            </select>
          </div>
          <div>
            <label for="feedbackRating">Mức hài lòng</label>
            <select id="feedbackRating">
              <option value="5">5 sao - Rất hài lòng</option>
              <option value="4">4 sao - Hài lòng</option>
              <option value="3">3 sao - Tạm ổn</option>
              <option value="2">2 sao - Cần cải thiện</option>
              <option value="1">1 sao - Chưa hài lòng</option>
            </select>
          </div>
          <div>
            <label for="feedbackComment">Phản hồi</label>
            <textarea id="feedbackComment" placeholder="Điều bạn thích hoặc mong muốn cải thiện..." required></textarea>
          </div>
          <button class="feedback-submit" type="submit"><i class="fas fa-paper-plane"></i> Gửi phản hồi</button>
          <div class="feedback-success" id="feedbackSuccess"><i class="fas fa-check-circle"></i> Cảm ơn bạn, phản hồi đã được ghi nhận.</div>
        </form>
      </div>

      <div class="feedback-panel">
        <h3><i class="fas fa-heart"></i> Người học nói gì?</h3>
        <p class="feedback-subtitle">Một vài phản hồi tích cực từ người dùng thử nghiệm.</p>
        <div class="feedback-stats">
          <div class="feedback-stat"><strong>${avg}</strong><span>điểm trung bình</span></div>
          <div class="feedback-stat"><strong>${positiveCount}</strong><span>phản hồi tích cực</span></div>
          <div class="feedback-stat"><strong>${feedbacks.length}</strong><span>lượt đánh giá</span></div>
        </div>
        <div class="feedback-list">${cards}</div>
      </div>
    </div>`;

  const form = document.getElementById("feedbackForm");
  if (form) form.addEventListener("submit", handleFeedbackSubmit);
}

function buildFeedbackCard(item) {
  const rating = Math.max(1, Math.min(5, Number(item.rating || 5)));
  const stars = Array.from({ length: 5 }, (_, idx) => idx < rating ? '<i class="fas fa-star"></i>' : '<i class="far fa-star"></i>').join("");
  return `
    <div class="feedback-card">
      <div class="feedback-card-top">
        <div>
          <div class="feedback-author">${escHtml(item.name)}</div>
          <div class="feedback-course">${escHtml(item.course)}</div>
        </div>
        <div class="feedback-stars">${stars}</div>
      </div>
      <div class="feedback-comment">${escHtml(item.comment)}</div>
      <div class="feedback-date">${escHtml(item.date)}</div>
    </div>`;
}

function handleFeedbackSubmit(e) {
  e.preventDefault();
  const name = document.getElementById("feedbackName").value.trim();
  const course = document.getElementById("feedbackCourse").value;
  const rating = Number(document.getElementById("feedbackRating").value);
  const comment = document.getElementById("feedbackComment").value.trim();
  if (!name || !comment) return;

  userFeedbacks.unshift({
    name,
    course,
    rating,
    comment,
    date: new Date().toLocaleDateString("vi-VN")
  });
  persistFeedbacks();
  renderFeedback();
  const success = document.getElementById("feedbackSuccess");
  if (success) {
    success.style.display = "block";
    setTimeout(() => { success.style.display = "none"; }, 2500);
  }
}

/* ===================== HELPERS ===================== */
function escHtml(str) { return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]||m)); }

function updateHeaderUI() {
  const g = document.getElementById("greetingText");
  const lb = document.getElementById("loginBtn"); const sb = document.getElementById("signupBtn"); const lo = document.getElementById("logoutBtn");
  if (currentUser) { g.innerHTML = `<i class="fas fa-user-circle"></i> Hello, ${escHtml(currentUser.username)}`; lb.style.display="none"; sb.style.display="none"; lo.style.display="inline-flex"; }
  else { g.innerHTML = `Guest`; lb.style.display="inline-flex"; sb.style.display="inline-flex"; lo.style.display="none"; }
}

function logout() {
  currentUser = null; localStorage.removeItem(CURRENT_USER_KEY); updateHeaderUI();
  if (activeTab === "catalog") renderCatalog();
  else if (activeTab === "mylearning") renderMyLearning();
  else if (activeTab === "live") renderLive();
  else if (activeTab === "feedback") renderFeedback();
}

function login(username, password) {
  const u = users.find(x => x.username === username && x.password === password);
  if (u) { currentUser = u; persistCurrentUser(); updateHeaderUI(); closeModals(); if (activeTab === "catalog") renderCatalog(); else if (activeTab === "mylearning") renderMyLearning(); else if (activeTab === "live") renderLive(); else renderFeedback(); return true; }
  return false;
}

function signup(username, email, password) {
  if (users.find(u => u.username === username)) return { success: false, msg: "Username đã tồn tại." };
  if (!username.trim() || !password.trim()) return { success: false, msg: "Cần điền username & password." };
  const nid = users.length > 0 ? Math.max(...users.map(u => u.id)) + 1 : 1;
  const nu = { id: nid, username: username.trim(), email: email.trim(), password, enrolledCourses: {} };
  users.push(nu); persistUsers(); currentUser = nu; persistCurrentUser(); updateHeaderUI(); closeModals();
  if (activeTab === "catalog") renderCatalog(); else if (activeTab === "mylearning") renderMyLearning(); else if (activeTab === "live") renderLive(); else renderFeedback();
  return { success: true };
}

function openLoginModal() { document.getElementById("loginModal").style.display = "flex"; }
function openSignupModal() { document.getElementById("signupModal").style.display = "flex"; }
function closeModals() {
  document.getElementById("loginModal").style.display = "none";
  document.getElementById("signupModal").style.display = "none";
  document.getElementById("loginError").innerText = "";
  document.getElementById("signupError").innerText = "";
}

function setActiveTab(tabId) {
  activeTab = tabId;
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.classList.toggle("active", btn.getAttribute("data-tab") === tabId);
  });
  document.getElementById("catalogView").style.display = tabId === "catalog" ? "block" : "none";
  document.getElementById("mylearningView").style.display = tabId === "mylearning" ? "block" : "none";
  document.getElementById("liveView").style.display = tabId === "live" ? "block" : "none";
  document.getElementById("feedbackView").style.display = tabId === "feedback" ? "block" : "none";
  if (tabId === "catalog") renderCatalog();
  else if (tabId === "mylearning") renderMyLearning();
  else if (tabId === "live") renderLive();
  else if (tabId === "feedback") renderFeedback();
}

function bindGlobalEvents() {
  document.getElementById("loginBtn").addEventListener("click", openLoginModal);
  document.getElementById("signupBtn").addEventListener("click", openSignupModal);
  document.getElementById("logoutBtn").addEventListener("click", logout);
  document.getElementById("closeLoginModal").addEventListener("click", closeModals);
  document.getElementById("closeSignupModal").addEventListener("click", closeModals);
  document.getElementById("confirmLoginBtn").addEventListener("click", () => {
    const u = document.getElementById("loginUsername").value;
    const p = document.getElementById("loginPassword").value;
    if (!login(u, p)) document.getElementById("loginError").innerText = "Sai tài khoản hoặc mật khẩu";
    else { document.getElementById("loginUsername").value = ""; document.getElementById("loginPassword").value = ""; }
  });
  document.getElementById("confirmSignupBtn").addEventListener("click", () => {
    const u = document.getElementById("signupUsername").value;
    const e = document.getElementById("signupEmail").value;
    const p = document.getElementById("signupPassword").value;
    const r = signup(u, e, p);
    if (!r.success) document.getElementById("signupError").innerText = r.msg;
    else { document.getElementById("signupUsername").value = ""; document.getElementById("signupEmail").value = ""; document.getElementById("signupPassword").value = ""; }
  });
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => setActiveTab(btn.getAttribute("data-tab")));
  });
  window.addEventListener("click", e => { if (e.target.classList.contains("modal")) closeModals(); });
}

function init() { loadData(); bindGlobalEvents(); updateHeaderUI(); setActiveTab("catalog"); }
init();
</script>
</body>
</html>
